# CI: typecheck, lint, tests, committed-dist staleness guard, JSON parse.
# Matrix runs on Ubuntu and Windows. pnpm with a frozen lockfile.
name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    # Actions minutes are metered on private repos. Skip auto-runs while the
    # repo is private (run `pnpm verify` locally instead — see README); the job
    # runs automatically once the repo is public (free) or on manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.repository.visibility == 'public'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Committed dist is fresh
        run: pnpm check:dist

      - name: JSON parse check
        shell: bash
        run: |
          git ls-files '*.json' -z | xargs -0 node -e '
            const fs = require("fs");
            let bad = 0;
            for (const f of process.argv.slice(1)) {
              if (/(^|\/)tsconfig[^\/]*\.json$/.test(f)) continue; // JSONC, skip
              try { JSON.parse(fs.readFileSync(f, "utf8")); }
              catch (e) { console.error("FAIL " + f + ": " + e.message); bad = 1; }
            }
            if (!bad) console.log("all JSON parses");
            process.exitCode = bad;
          '
