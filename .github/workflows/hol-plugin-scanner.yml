name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@b7d8b3299327f03f6e0a4a1eccbc5e3ee748151d # v1
        with:
          plugin_dir: "."
          config: .plugin-scanner.toml
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
