name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@1865a196d642ab92ad4c660706ddadbd545cf6d8 # v1
        with:
          plugin_dir: "."
          config: .plugin-scanner.toml
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
