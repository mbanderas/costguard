name: docker-ci
on:
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-bad:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t app:latest .
  build-good:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image with cache
        run: docker buildx build --cache-from type=gha --cache-to type=gha,mode=max -t app:latest .
