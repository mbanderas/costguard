name: heavy-build
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
concurrency:
  group: heavy-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest-32-cores
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: make build
