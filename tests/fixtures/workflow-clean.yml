name: CI Clean

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_call:

concurrency:
  group: ci-clean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: typecheck
        run: pnpm typecheck
      - name: lint
        run: pnpm lint

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test
